<!DOCTYPE html>
<html>
<head>
<title>DevOps CI/CD Demo</title>

<script>
function showMessage() {
var name = document.getElementById("name").value;
var email = document.getElementById("email").value;

if(name === "" || email === "") {
alert("Please fill all fields!");
} else {
document.getElementById("successMessage").innerHTML =
"✅ Added Successfully!";
}
}
</script>

</head>

<body style="text-align:center; font-family:Arial; margin-top:50px;">

<h1>🚀 DevOps Pipeline Working Successfully!</h1>
<h2>HTML App Deployed Using Docker</h2>
<p>GitHub → Jenkins → Docker</p>

<hr style="width:50%;">

<h3>Enter Details</h3>

<input type="text" id="name" placeholder="Enter Name"><br><br>
<input type="email" id="email" placeholder="Enter Email"><br><br>

<button onclick="showMessage()">Submit</button>

<h3 id="successMessage" style="color:green;"></h3>

</body>
</html>
